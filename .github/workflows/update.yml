name: Update Flake Inputs And Github Releases

on:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allow manual triggering

jobs:
  update-flake-inputs:
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Nix
        uses: cachix/install-nix-action@v31

      - name: Update Github Releases Sources
        run: |
          nix run github:Mic92/nix-update -- --flake northstar --use-github-releases

      - name: Update Inputs
        run: |
          nix flake update bp-ort r2rcon-rs

      - name: Create pull request for Northstar Releases update
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore(deps): Update Northstar Releases & Inputs"
          branch: update-releases
          title: "chore(deps): Update Northstar Releases & Inputs"
          body: "Update Northstar Releases & Inputs"
          author: "northstar-nightly-flake-updater[bot] <northstar-nightly-flake-updater[bot]@users.noreply.github.com>"
          committer: "northstar-nightly-flake-updater[bot] <northstar-nightly-flake-updater[bot]@users.noreply.github.com>"
          labels: |
            dependencies
          delete-branch: true

      - name: Enable auto-merge
        id: enable-auto-merge
        if: steps.create-pr.outputs.pull-request-number
        run: |
          gh pr merge --auto -ds ${{ steps.create-pr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
