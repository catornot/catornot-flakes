name: Update Flake Inputs And Github Releases

on:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allow manual triggering

jobs:
  update-flake-inputs:
    runs-on: ubuntu-slim
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
            token: ${{ steps.app-token.outputs.token }}

      - name: Setup Nix
        uses: cachix/install-nix-action@v31

      - name: Update Github Releases Sources
        run: |
          nix run github:Mic92/nix-update -- --flake northstar --use-github-releases

      - name: Update flake inputs
        uses: mic92/update-flake-inputs@main
        # github-token defaults to ${{ github.token }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          # Optional: exclude specific files or inputs
          exclude-patterns: 'flake.nix#flake-utils,flake.nix#nixpkgs'
          # Optional: add custom labels (default: 'dependencies')
          # pr-labels: 'dependencies,automated'
          # Optional: enable auto-merge (default: false)
          auto-merge: 'true'
          # Optional: choose merge method when auto-merge is enabled (default: MERGE)
          auto-merge-method: 'SQUASH'
